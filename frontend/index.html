<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behavionyx</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page-bg"></div>

    <div class="container">
        <div class="brand">
            <div class="brand-badge">🔐</div>
            <h1 class="logo">Behavionyx</h1>
            <p class="tagline">Security that learns you</p>
        </div>

        <div class="card">
            <div class="tabs">
                <span id="loginTab" class="active" onclick="showLogin()">Login</span>
                <span id="signupTab" onclick="showSignup()">Sign Up</span>
                <div class="slider"></div>
            </div>

            <div id="loginForm" class="form-section">
                <h2>Welcome back</h2>
                <p class="subtext">Access your account securely</p>

                <div class="input-box">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter your username">
                </div>

                <div class="input-box password-box">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter your password">
                        <span class="toggle-eye" onclick="togglePassword('password')">👁️</span>
                    </div>
                </div>

                <button onclick="login()">Access System</button>
            </div>

            <div id="signupForm" class="form-section" style="display:none;">
                <h2>Create account</h2>
                <p class="subtext">Set up your secure Behavionyx profile</p>

                <div class="input-box">
                    <label for="signupUsername">Username</label>
                    <input type="text" id="signupUsername" placeholder="Choose a username">
                </div>

                <div class="input-box password-box">
                    <label for="signupPassword">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="signupPassword" placeholder="Create a password">
                        <span class="toggle-eye" onclick="togglePassword('signupPassword')">👁️</span>
                    </div>
                </div>

                <div class="input-box password-box">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Confirm your password">
                        <span class="toggle-eye" onclick="togglePassword('confirmPassword')">👁️</span>
                    </div>
                </div>

                <button onclick="signup()">Create Account</button>
            </div>

            <p class="note">Behavioral authentication enabled</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>

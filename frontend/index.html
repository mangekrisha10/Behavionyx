<!DOCTYPE html>
<html>

<head>
    <title>Behavionyx</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1 class="logo">🔐 Behavionyx</h1>
        <p class="tagline">Security that learns you</p>

        <!-- Tabs -->
        <div class="tabs">
            <span id="loginTab" class="active" onclick="showLogin()">Login</span>
            <span id="signupTab" onclick="showSignup()">Sign Up</span>
            <div class="slider"></div>
        </div>

        <!-- Card -->
        <div class="card">

            <!-- Login -->
            <div id="loginForm">

                <div class="input-box">
                    <input type="text" id="loginUsername" placeholder="Username">
                </div>

                <div class="input-box password-box">
                    <input type="password" id="password" placeholder="Password">
                    <span class="toggle-eye" onclick="togglePassword('password')">👁️</span>
                </div>

                <button onclick="login()">Access System</button>
            </div>

            <!-- Signup -->
            <div id="signupForm" style="display:none;">

                <div class="input-box">
                    <input type="text" id="signupUsername" placeholder="Username">
                </div>

                <div class="input-box password-box">
                    <input type="password" id="signupPassword" placeholder="Password">
                    <span class="toggle-eye" onclick="togglePassword('signupPassword')">👁️</span>
                </div>

                <div class="input-box password-box">
                    <input type="password" id="confirmPassword" placeholder="Confirm Password">
                    <span class="toggle-eye" onclick="togglePassword('confirmPassword')">👁️</span>
                </div>

                <button onclick="signup()">Create Account</button>

            </div>

            <p class="note">Behavioral authentication enabled</p>
        </div>

        <script src="script.js"></script>
</body>

</html>

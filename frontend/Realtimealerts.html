<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyber Security Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            font-family: "Inter", Arial, sans-serif;
            background: #f8fafc;
            color: #1e293b;
        }
        
        .dashboard {
            padding: 30px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .notif-badge {
            background: #ef4444;
            color: white;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.3);
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        
        .card {
            background: white;
            border-radius: 18px;
            padding: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
        }
        
        .score-card h2 {
            font-size: 48px;
            margin: 0;
            color: #dc2626;
        }
        
        .score-card p {
            margin: 8px 0 0;
            color: #64748b;
        }
        
        .history-panel ul {
            padding-left: 20px;
            line-height: 1.8;
            color: #475569;
        }
        
        .alert-card {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 360px;
            background: #ffffff;
            border-left: 5px solid #ef4444;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 18px 20px;
            display: flex;
            gap: 14px;
            transform: translateX(120%);
            opacity: 0;
            transition: all 0.45s ease;
            overflow: hidden;
            z-index: 999;
        }
        
        .alert-card.show {
            transform: translateX(0);
            opacity: 1;
        }
        
        .alert-icon {
            font-size: 24px;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.12);
            }
        }
        
        .alert-content {
            flex: 1;
        }
        
        .alert-content h4 {
            margin: 0;
            color: #dc2626;
        }
        
        .alert-content p {
            margin: 6px 0 0;
            color: #475569;
        }
        
        .progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            width: 100%;
            background: #ef4444;
            animation: progressBar 5s linear forwards;
        }
        
        @keyframes progressBar {
            from {
                width: 100%;
            }
            to {
                width: 0;
            }
        }
        
        canvas {
            width: 100%;
            height: 220px;
            border-radius: 12px;
            background: #f8fafc;
        }
    </style>
</head>

<body>

    <div class="dashboard">
        <div class="top-bar">
            <div>
                <h1>Cyber Security Dashboard</h1>
                <p>System monitoring active...</p>
            </div>
            <div class="notif-badge" id="notifCount">0</div>
        </div>

        <div class="grid">
            <div class="card score-card">
                <h2 id="scoreValue">0</h2>
                <p>Current Risk Score</p>
            </div>

            <div class="card">
                <h3>Latest Threat Details</h3>
                <p><strong>IP:</strong> <span id="ip">192.168.1.10</span></p>
                <p><strong>Location:</strong> <span id="location">Mumbai</span></p>
                <p><strong>Device:</strong> <span id="device">Chrome Browser</span></p>
            </div>

            <div class="card history-panel">
                <h3>Recent Alerts</h3>
                <ul id="alertHistory"></ul>
            </div>

            <div class="card">
                <h3>Risk Trend</h3>
                <canvas id="riskChart" width="400" height="220"></canvas>
            </div>
        </div>
    </div>

    <!-- Alert popup -->
    <div id="alertBox" class="alert-card">
        <div class="alert-icon">🔔</div>
        <div class="alert-content">
            <h4>Suspicious Activity Detected</h4>
            <p id="alertMessage">Risk threshold crossed</p>
        </div>
        <div class="progress"></div>
    </div>

    <script>
        let notificationCount = 0;
        let riskData = [20, 35, 40, 60, 50];
        const canvas = document.getElementById("riskChart");
        const ctx = canvas.getContext("2d");

        function drawGraph() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.lineWidth = 3;
            ctx.strokeStyle = "#ef4444";

            let stepX = canvas.width / (riskData.length - 1);

            riskData.forEach((score, index) => {
                let x = index * stepX;
                let y = canvas.height - (score * 2);

                if (index === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });

            ctx.stroke();
        }

        function showAlert(message) {
            const alertBox = document.getElementById("alertBox");
            document.getElementById("alertMessage").innerText = message;
            alertBox.classList.add("show");

            setTimeout(() => {
                alertBox.classList.remove("show");
            }, 5000);
        }

        function addHistory(message, score) {
            const history = document.getElementById("alertHistory");
            const li = document.createElement("li");
            li.innerText = `⚠️ ${message} - Risk ${score}`;
            history.prepend(li);

            if (history.children.length > 5) {
                history.removeChild(history.lastChild);
            }
        }

        function updateDashboard() {
            let riskScore = Math.floor(Math.random() * 100);
            let threats = [
                "Failed Login Attempt",
                "Unknown IP Access",
                "Privilege Escalation",
                "New Device Login",
                "Geo-location Mismatch"
            ];

            let randomThreat = threats[Math.floor(Math.random() * threats.length)];

            document.getElementById("scoreValue").innerText = riskScore;
            document.getElementById("ip").innerText = "192.168.1." + Math.floor(Math.random() * 255);
            document.getElementById("location").innerText = ["Mumbai", "Delhi", "Unknown"][Math.floor(Math.random() * 3)];
            document.getElementById("device").innerText = ["Chrome", "Firefox", "Edge"][Math.floor(Math.random() * 3)];

            riskData.push(riskScore);
            if (riskData.length > 8) riskData.shift();
            drawGraph();

            if (riskScore > 70) {
                notificationCount++;
                document.getElementById("notifCount").innerText = notificationCount;
                showAlert(randomThreat);
                addHistory(randomThreat, riskScore);
            }
        }

        drawGraph();
        updateDashboard();
        setInterval(updateDashboard, 4000);
    </script>

</body>

</html>
